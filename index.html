<link href="https://fonts.googleapis.com" rel="preconnect"/>

<style>
    .home-figure-stack {
      display: grid;
      gap: 1.25rem;
      align-content: start;
    }

    .feature-figure {
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      padding: 0.9rem;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .feature-figure img,
    .paper-figure img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .feature-figure figcaption,
    .paper-figure figcaption {
      margin-top: 0.8rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #475569;
    }

    .feature-figure strong,
    .paper-figure strong {
      color: #0f172a;
    }

    .card-stack {
      display: grid;
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .hero {
      align-items: start;
    }

    .hero-text {
      display: grid;
      align-content: start;
    }

    .paper-figure {
      margin: 1rem 0 1.5rem 0;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      padding: 0.9rem;
    }

    .paper-note-grid {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .paper-note-grid .mini-note {
      padding: 1rem 1.1rem;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .paper-note-grid .mini-note h4 {
      margin-bottom: 0.35rem;
      font-size: 1rem;
    }

    .reading-queue {
      margin-top: 1.5rem;
      padding: 1.2rem 1.25rem;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .reading-queue ul {
      margin: 0.75rem 0 0 1.15rem;
    }

    .reading-queue li + li {
      margin-top: 0.45rem;
    }

    @media (max-width: 960px) {
      .home-figure-stack {
        margin-top: 1.5rem;
      }
    }
  
    .paper-figure {
      margin: 1rem auto 1.5rem;
      max-width: 50%;
    }

    .paper-figure img {
      width: 100%;
      height: auto;
      display: block;
    }

    .paper-figure figcaption {
      margin-top: 0.55rem;
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      .paper-figure {
        max-width: 100%;
      }
    }
</style>
</head>
